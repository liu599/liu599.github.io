<script>
(function () {
  var q = "";
  var curCat = "all";

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function matches(r) {
    if (!q) return true;
    var s = q.toLowerCase();
    return r.n.toLowerCase().indexOf(s) >= 0 || (r.d || "").toLowerCase().indexOf(s) >= 0;
  }

  document.getElementById("total").textContent = DATA.total;
  document.getElementById("gen").textContent = DATA.generated;

  // distribution bars (sorted by count desc)
  var sorted = DATA.categories.slice().sort(function (a, b) { return b.count - a.count; });
  var max = sorted.length ? sorted[0].count : 1;
  var dist = document.getElementById("dist");
  sorted.forEach(function (c) {
    var row = document.createElement("div");
    row.className = "bar-row";
    row.title = "点击筛选：" + c.title;
    row.innerHTML =
      '<div class="bar-label">' + esc(c.title) + "</div>" +
      '<div class="bar-track"><div class="bar-fill" style="width:' + (c.count / max * 100).toFixed(1) + '%"></div></div>' +
      '<div class="bar-val">' + c.count + "</div>";
    row.addEventListener("click", function () { setCat(c.key); document.querySelector(".controls").scrollIntoView({ behavior: "smooth" }); });
    dist.appendChild(row);
  });

  // pills
  var pills = document.getElementById("pills");
  function buildPills() {
    pills.innerHTML = "";
    var all = document.createElement("span");
    all.className = "pill" + (curCat === "all" ? " active" : "");
    all.textContent = "全部 " + DATA.total;
    all.addEventListener("click", function () { setCat("all"); });
    pills.appendChild(all);
    DATA.categories.forEach(function (c) {
      var p = document.createElement("span");
      p.className = "pill" + (curCat === c.key ? " active" : "");
      p.textContent = c.title + " · " + c.count;
      p.addEventListener("click", function () { setCat(c.key); });
      pills.appendChild(p);
    });
  }
  function setCat(k) { curCat = k; buildPills(); render(); }

  var listEl = document.getElementById("list");
  function render() {
    var html = "";
    var shown = 0;
    DATA.categories.forEach(function (c) {
      if (curCat !== "all" && c.key !== curCat) return;
      var repos = c.repos.filter(matches);
      if (repos.length === 0) return;
      shown += repos.length;
      html += '<div class="cat"><div class="cat-head"><h2>' + esc(c.title) + '</h2><span class="cat-count">' + repos.length + " 个</span></div>";
      html += '<table><thead><tr><th>仓库</th><th>语言</th><th style="text-align:right">★</th><th>描述</th></tr></thead><tbody>';
      repos.forEach(function (r) {
        html +=
          "<tr>" +
          '<td class="repo"><a href="' + esc(r.u) + '" target="_blank">' + esc(r.n) + "</a></td>" +
          '<td class="lang">' + (r.l ? esc(r.l) : "—") + "</td>" +
          '<td class="stars">' + r.s.toLocaleString() + "</td>" +
          '<td class="desc">' + (r.d ? esc(r.d) : "") + "</td>" +
          "</tr>";
      });
      html += "</tbody></table></div>";
    });
    if (!html) html = '<p class="empty">没有匹配的仓库</p>';
    listEl.innerHTML = html;
    document.getElementById("shown").textContent = "显示 " + shown + " / " + DATA.total + " 个";
  }

  var input = document.getElementById("q");
  input.addEventListener("input", function () { q = input.value.trim(); render(); });

  buildPills();
  render();
})();
</script>
